<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lehrpersonen-Dashboard · Global History Learning Platform</title>
<style>
:root{
  --navy-deep:#0A1A3A;--navy-mid:#152A5E;--navy-light:#1E3470;
  --blue-bright:#1E5AA8;--blue-glow:#4A90E2;
  --gold:#F0B33D;--gold-bright:#FFD24A;--white:#fff;--grey:#B0BCD6;
  --teal:#2DB6A8;--purple:#7E5AE8;--green:#2EA84A;--amber:#E8A33C;--red:#C8312B;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Calibri','Helvetica Neue',sans-serif;color:#fff;line-height:1.55;
  background:radial-gradient(ellipse at 80% 0%,rgba(45,182,168,0.16) 0%,transparent 52%),radial-gradient(ellipse at center,var(--navy-mid) 0%,var(--navy-deep) 78%);
  background-attachment:fixed;min-height:100vh;padding-bottom:60px;}
.wrap{max-width:940px;margin:0 auto;padding:24px 20px;}
.topnav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.back{font-size:12.5px;color:var(--teal);text-decoration:none;letter-spacing:0.5px;}
.back:hover{color:var(--gold-bright);}
.lang-toggle{display:flex;gap:2px;background:var(--navy-deep);border:1px solid rgba(45,182,168,0.4);border-radius:20px;padding:2px;}
.lang-toggle button{background:transparent;border:none;color:var(--grey);font-family:inherit;font-size:11px;font-weight:bold;letter-spacing:1px;padding:5px 12px;border-radius:16px;cursor:pointer;}
.lang-toggle button.active{background:var(--teal);color:var(--navy-deep);}

.head{margin-bottom:8px;}
.head .eyebrow{font-size:11px;letter-spacing:3px;color:var(--teal);font-weight:bold;}
.head h1{font-family:Georgia,serif;font-size:30px;font-style:italic;margin:5px 0 4px;}
.head p{color:var(--grey);font-size:14px;}

/* module switch */
.modswitch{display:flex;gap:8px;margin:18px 0 6px;flex-wrap:wrap;}
.modswitch button{background:var(--navy-mid);border:1px solid var(--blue-bright);color:#fff;font-family:inherit;font-size:13px;padding:8px 16px;border-radius:20px;cursor:pointer;transition:.2s;}
.modswitch button.active{background:var(--teal);border-color:var(--teal);color:var(--navy-deep);font-weight:bold;}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--blue-bright);margin:20px 0 18px;flex-wrap:wrap;}
.tab{background:transparent;border:none;color:var(--grey);font-family:inherit;font-size:13.5px;font-weight:bold;padding:10px 16px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:.2s;}
.tab.active{color:var(--gold-bright);border-bottom-color:var(--gold);}
.panel{display:none;animation:fade .3s;}
.panel.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* lesson flow */
.flow-row{display:flex;gap:12px;align-items:flex-start;background:rgba(21,42,94,0.5);border:1px solid var(--blue-bright);border-radius:13px;padding:15px 17px;margin-bottom:11px;}
.flow-row .ch-num{font-family:Georgia,serif;font-size:22px;color:var(--gold);font-weight:bold;min-width:34px;text-align:center;}
.flow-row .ch-body{flex:1;}
.flow-row .ch-name{font-size:16px;font-weight:bold;font-family:Georgia,serif;}
.flow-row .ch-fmt{font-size:12px;color:var(--grey);margin-top:2px;}
.flow-row .ch-time{font-size:11px;color:var(--teal);font-weight:bold;white-space:nowrap;background:rgba(45,182,168,0.12);padding:3px 9px;border-radius:10px;}
.comps{margin-top:9px;display:flex;flex-wrap:wrap;gap:5px;}
.comp{font-size:10px;background:rgba(45,182,168,0.16);color:var(--teal);padding:2px 9px;border-radius:9px;letter-spacing:0.5px;font-weight:bold;}
.prompt{margin-top:10px;font-size:12.5px;color:#CDE7E4;background:rgba(45,182,168,0.07);border-left:3px solid var(--teal);border-radius:0 8px 8px 0;padding:9px 12px;}
.prompt .pl{font-size:9.5px;letter-spacing:1px;font-weight:bold;color:var(--teal);display:block;margin-bottom:3px;}
.flag{margin-top:10px;font-size:12.5px;color:#FFD9B0;background:rgba(232,163,60,0.1);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:9px 12px;}
.flag .pl{font-size:9.5px;letter-spacing:1px;font-weight:bold;color:var(--amber);display:block;margin-bottom:3px;}

/* overview cards */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px;}
.ov-card{background:rgba(21,42,94,0.5);border:1px solid var(--blue-bright);border-radius:13px;padding:15px;}
.ov-card .ov-n{font-family:Georgia,serif;font-size:30px;color:var(--gold-bright);font-weight:bold;}
.ov-card .ov-l{font-size:11.5px;color:var(--grey);margin-top:2px;}
.info-box{background:rgba(45,182,168,0.08);border:1px dashed var(--teal);border-radius:12px;padding:14px 16px;font-size:13px;color:#CDE7E4;margin-bottom:16px;line-height:1.6;}
.info-box b{color:var(--gold-bright);}

/* assessment */
.assess-intro{font-size:13.5px;color:var(--grey);margin-bottom:14px;line-height:1.6;}
.code-input{width:100%;background:var(--navy-deep);border:1px solid var(--blue-bright);border-radius:10px;color:#fff;font-family:'Courier New',monospace;font-size:12.5px;padding:11px 13px;resize:vertical;min-height:84px;}
.btn{background:var(--teal);color:var(--navy-deep);border:none;padding:10px 20px;font-family:inherit;font-size:13px;font-weight:bold;letter-spacing:0.5px;cursor:pointer;border-radius:8px;transition:.2s;margin-top:10px;}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn.ghost{background:transparent;color:var(--teal);border:1px solid var(--teal);margin-left:8px;}
.bars{margin-top:18px;}
.bar-row{margin-bottom:13px;}
.bar-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;}
.bar-top .bn{font-weight:bold;color:#fff;}
.bar-top .bf{color:var(--gold-bright);font-family:Georgia,serif;}
.bar-track{height:14px;background:var(--navy-deep);border-radius:7px;overflow:hidden;border:1px solid rgba(176,188,214,0.2);}
.bar-fill{height:100%;border-radius:7px;transition:width .6s ease;}
.bar-fill.hi{background:linear-gradient(90deg,var(--green),#5fd47a);}
.bar-fill.mid{background:linear-gradient(90deg,var(--amber),var(--gold-bright));}
.bar-fill.lo{background:linear-gradient(90deg,var(--red),#ff7a72);}
.bar-hint{font-size:11px;color:var(--grey);margin-top:3px;}
.empty{text-align:center;color:var(--grey);font-size:13px;padding:24px;border:1px dashed var(--blue-bright);border-radius:12px;}
.legend{font-size:11.5px;color:var(--grey);margin-top:14px;line-height:1.6;}
.legend .sw{display:inline-block;width:11px;height:11px;border-radius:3px;margin:0 4px 0 10px;vertical-align:middle;}
</style>
</head>
<body>
<div class="wrap">

  <div class="topnav">
    <a class="back" href="../index.html" data-i18n="nav.back">← Zur Plattform</a>
    <div class="lang-toggle">
      <button id="langDE" class="active" onclick="setLang('de')">DE</button>
      <button id="langEN" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="head">
    <div class="eyebrow" data-i18n="head.eyebrow">LEHRPERSONEN-SEITE</div>
    <h1 data-i18n="head.title">Dashboard</h1>
    <p data-i18n="head.sub">Kompetenzen, Stundenablauf, Diskussionsimpulse und Klassenauswertung — pro Modul.</p>
  </div>

  <div class="modswitch" id="modSwitch"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="overview" data-i18n="tabs.overview">Überblick</button>
    <button class="tab" data-tab="flow" data-i18n="tabs.flow">Stundenablauf</button>
    <button class="tab" data-tab="assess" data-i18n="tabs.assess">Klassenauswertung</button>
  </div>

  <div class="panel active" id="panel-overview"></div>
  <div class="panel" id="panel-flow"></div>
  <div class="panel" id="panel-assess"></div>

</div>

<script src="../shared/store.js"></script>
<script>
// ============================================================
// TEACHER DASHBOARD
// Reads the same module metadata the student modules use, so the
// two sides never drift. (Here inlined; in production this would
// be a shared import.)
// ============================================================

const UI = {
  de:{
    nav:{back:'← Zur Plattform'},
    head:{eyebrow:'LEHRPERSONEN-SEITE',title:'Dashboard',sub:'Kompetenzen, Stundenablauf, Diskussionsimpulse und Klassenauswertung — pro Modul.'},
    tabs:{overview:'Überblick',flow:'Stundenablauf',assess:'Klassenauswertung'},
    ov:{chapters:'Kapitel',duration:'Dauer (ca.)',comps:'Kompetenzen',min:'Min.',
      box:'Dieses Modul ist als <b>Doppelstunde</b> angelegt, lässt sich aber kapitelweise auf Einzelstunden aufteilen. Jedes Kapitel endet mit einem Checkpoint, der Antworten nach Kompetenz erfasst.',
      compsTitle:'Adressierte RZG-Kompetenzen'},
    flow:{plLabel:'DISKUSSIONSIMPULS',flagLabel:'SENSIBLES THEMA — HINWEIS',time:'Min.'},
    assess:{
      intro:'Lass die Lernenden am Ende ihres Lernpfads ihren <b>Ergebnis-Code</b> kopieren (Button im Modul). Füge die Codes hier ein — je Zeile einer — und werte die Klasse nach Kompetenz aus. Für die grössere Pilotierung ersetzt ein Backend diesen Schritt.',
      placeholder:'Ergebnis-Codes hier einfügen (einer pro Zeile)…',
      analyze:'Auswerten',demo:'Demo-Daten laden',clear:'Leeren',
      students:'Lernende',answers:'Antworten',avg:'Durchschnitt',
      empty:'Noch keine Codes ausgewertet. Füge oben Codes ein oder lade Demo-Daten.',
      legendTitle:'Lesehilfe:',hi:'stark',mid:'im Aufbau',lo:'Übung nötig',
      hintN:(c,t)=>`${c} von ${t} richtig`}
  },
  en:{
    nav:{back:'← Back to platform'},
    head:{eyebrow:'TEACHER SIDE',title:'Dashboard',sub:'Competencies, lesson flow, discussion prompts and class results — per module.'},
    tabs:{overview:'Overview',flow:'Lesson flow',assess:'Class results'},
    ov:{chapters:'Chapters',duration:'Duration (approx.)',comps:'Competencies',min:'min',
      box:'This module is designed as a <b>double lesson</b>, but can be split chapter-by-chapter into single lessons. Each chapter ends with a checkpoint that records answers by competency.',
      compsTitle:'RZG competencies addressed'},
    flow:{plLabel:'DISCUSSION PROMPT',flagLabel:'SENSITIVE TOPIC — NOTE',time:'min'},
    assess:{
      intro:'At the end of their pathway, have students copy their <b>result code</b> (button in the module). Paste the codes here — one per line — and analyse the class by competency. For larger piloting, a backend replaces this step.',
      placeholder:'Paste result codes here (one per line)…',
      analyze:'Analyse',demo:'Load demo data',clear:'Clear',
      students:'Students',answers:'Answers',avg:'Average',
      empty:'No codes analysed yet. Paste codes above or load demo data.',
      legendTitle:'How to read:',hi:'strong',mid:'developing',lo:'needs practice',
      hintN:(c,t)=>`${c} of ${t} correct`}
  }
};

// ---- Module teaching metadata (mirrors student modules) ----
const MODULES = {
  sugar:{
    name:{de:'🍬 Zucker',en:'🍬 Sugar'},
    duration:90,
    chapters:[
      { num:1, name:{de:'Eine süsse Frage',en:'A Sweet Question'}, time:15,
        fmt:{de:'Aufdeck-Kacheln · Checkpoint',en:'Reveal tiles · checkpoint'},
        comps:['cause','interdep'],
        prompt:{de:'Welche Ware von heute könnte eine ähnliche Kette auslösen wie Zucker damals?',en:'Which product today could trigger a chain like sugar did?'} },
      { num:2, name:{de:'Das Dreieck',en:'The Triangle'}, time:15,
        fmt:{de:'Interaktive Karte · Checkpoint',en:'Interactive map · checkpoint'},
        comps:['interdep','cause'],
        prompt:{de:'Lasst die Klasse den Kreislauf aus dem Gedächtnis nachzeichnen und jede Strecke beschriften.',en:'Have the class redraw the loop from memory and label each leg.'} },
      { num:3, name:{de:'Auf der Plantage',en:'On the Plantation'}, time:25,
        fmt:{de:'Szenario-Entscheidungen · Checkpoint',en:'Scenario decisions · checkpoint'},
        comps:['judgement','perspective','cause'],
        flag:{de:'Thema Sklaverei. Klasse vorab vorbereiten; die Szenarien spielen kein Leid nach, sondern üben Urteilen (Struktur vs. Verantwortung). Zeit für Nachbesprechung einplanen.',en:'Topic: slavery. Prepare the class beforehand; the scenarios do not re-enact suffering but practise judgement (structure vs. responsibility). Plan time for a debrief.'} },
      { num:4, name:{de:'Ursache & Folge',en:'Cause & Consequence'}, time:15,
        fmt:{de:'Sortier-Aufgabe · Checkpoint',en:'Sorting task · checkpoint'},
        comps:['cause','continuity'],
        prompt:{de:'Karten an die Wandtafel und mit Pfeilen zu einer Kette verbinden lassen — „Folge wird zur neuen Ursache“.',en:'Put cards on the board and connect with arrows into a chain — "consequence becomes new cause".'} },
      { num:5, name:{de:'Zucker heute',en:'Sugar Today'}, time:20,
        fmt:{de:'Zeitstrahl · Kontinuität/Wandel · Checkpoint',en:'Timeline · continuity/change · checkpoint'},
        comps:['continuity','present','interdep'],
        prompt:{de:'Abschluss-Schreibaufgabe: „Nenne je zwei Beispiele für Kontinuität und Wandel und begründe.“',en:'Closing writing task: "Give two examples each of continuity and change, and justify."'} },
    ],
  },
  migration:{
    name:{de:'🧳 Migration',en:'🧳 Migration'},
    duration:70,
    chapters:[
      { num:1, name:{de:'Warum Menschen gehen',en:'Why People Leave'}, time:15,
        fmt:{de:'Aufdeck-Kacheln · Checkpoint',en:'Reveal tiles · checkpoint'},
        comps:['cause','perspective'],
        prompt:{de:'Push- und Pull-Faktoren an der Tafel sammeln — welche gelten auch heute?',en:'Collect push and pull factors on the board — which still apply today?'} },
      { num:2, name:{de:'Die Reise',en:'The Journey'}, time:20,
        fmt:{de:'Szenario-Entscheidungen · Checkpoint',en:'Scenario decisions · checkpoint'},
        comps:['perspective','judgement'],
        flag:{de:'Migration kann persönlich betreffen. Sensibel moderieren; Lernende entscheiden selbst, ob sie eigene Geschichten teilen.',en:'Migration can be personal. Facilitate sensitively; students decide for themselves whether to share their own stories.'} },
      { num:3, name:{de:'Was bleibt, was sich ändert',en:'What Stays, What Changes'}, time:20,
        fmt:{de:'Zeitstrahl · Kontinuität/Wandel · Checkpoint',en:'Timeline · continuity/change · checkpoint'},
        comps:['continuity','present'],
        prompt:{de:'Schweizer Migrationsgeschichte einbeziehen: Aus- und Einwanderung im Vergleich über die Zeit.',en:'Bring in Swiss migration history: emigration and immigration compared over time.'} },
    ],
  },
};

let LANG='de';
let CURRENT='sugar';

function setLang(l){
  LANG=l;
  try{localStorage.setItem('ghp_lang',l);}catch(e){}
  document.documentElement.lang=l;
  document.getElementById('langDE').classList.toggle('active',l==='de');
  document.getElementById('langEN').classList.toggle('active',l==='en');
  applyStatics();renderModSwitch();renderAll();
}
function applyStatics(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const path=el.getAttribute('data-i18n').split('.');
    let v=UI[LANG];path.forEach(p=>v=v&&v[p]);
    if(typeof v==='string')el.textContent=v;
  });
}
function renderModSwitch(){
  const sw=document.getElementById('modSwitch');sw.innerHTML='';
  Object.keys(MODULES).forEach(id=>{
    const b=document.createElement('button');
    b.className=(id===CURRENT?'active':'');
    b.textContent=MODULES[id].name[LANG];
    b.onclick=()=>{CURRENT=id;renderModSwitch();renderAll();};
    sw.appendChild(b);
  });
}

function renderAll(){renderOverview();renderFlow();/* assess re-rendered on demand */ renderAssess();}

function renderOverview(){
  const m=MODULES[CURRENT];const U=UI[LANG].ov;
  const allComps=[...new Set(m.chapters.flatMap(c=>c.comps))];
  const p=document.getElementById('panel-overview');
  p.innerHTML=`
    <div class="ov-grid">
      <div class="ov-card"><div class="ov-n">${m.chapters.length}</div><div class="ov-l">${U.chapters}</div></div>
      <div class="ov-card"><div class="ov-n">${m.duration}</div><div class="ov-l">${U.duration} · ${U.min}</div></div>
      <div class="ov-card"><div class="ov-n">${allComps.length}</div><div class="ov-l">${U.comps}</div></div>
    </div>
    <div class="info-box">${U.box}</div>
    <div style="font-size:11px;letter-spacing:2px;color:var(--teal);font-weight:bold;text-transform:uppercase;margin:8px 0 10px;">${U.compsTitle}</div>
    <div class="comps">${allComps.map(c=>`<span class="comp">${Store.competencyName(c,LANG)}</span>`).join('')}</div>`;
}

function renderFlow(){
  const m=MODULES[CURRENT];const F=UI[LANG].flow;
  const p=document.getElementById('panel-flow');
  p.innerHTML=m.chapters.map(ch=>`
    <div class="flow-row">
      <div class="ch-num">${ch.num}</div>
      <div class="ch-body">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
          <div><div class="ch-name">${ch.name[LANG]}</div><div class="ch-fmt">${ch.fmt[LANG]}</div></div>
          <span class="ch-time">${ch.time} ${F.time}</span>
        </div>
        <div class="comps">${ch.comps.map(c=>`<span class="comp">${Store.competencyName(c,LANG)}</span>`).join('')}</div>
        ${ch.prompt?`<div class="prompt"><span class="pl">${F.plLabel}</span>${ch.prompt[LANG]}</div>`:''}
        ${ch.flag?`<div class="flag"><span class="pl">${F.flagLabel}</span>${ch.flag[LANG]}</div>`:''}
      </div>
    </div>`).join('');
}

// ---- assessment aggregator ----
let lastDecoded=[];
function renderAssess(){
  const A=UI[LANG].assess;
  const p=document.getElementById('panel-assess');
  p.innerHTML=`
    <div class="assess-intro">${A.intro}</div>
    <textarea class="code-input" id="codeBox" placeholder="${A.placeholder}"></textarea>
    <div>
      <button class="btn" id="analyzeBtn">${A.analyze}</button>
      <button class="btn ghost" id="demoBtn">${A.demo}</button>
      <button class="btn ghost" id="clearBtn">${A.clear}</button>
    </div>
    <div id="assessResult"></div>`;
  document.getElementById('analyzeBtn').onclick=()=>{
    const lines=document.getElementById('codeBox').value.split(/\n+/).map(s=>s.trim()).filter(Boolean);
    lastDecoded=lines.map(c=>Store.decode(c)).filter(Boolean);
    drawBars();
  };
  document.getElementById('demoBtn').onclick=()=>{
    document.getElementById('codeBox').value=DEMO_CODES().join('\n');
    const lines=DEMO_CODES();
    lastDecoded=lines.map(c=>Store.decode(c)).filter(Boolean);
    drawBars();
  };
  document.getElementById('clearBtn').onclick=()=>{document.getElementById('codeBox').value='';lastDecoded=[];drawBars();};
  drawBars();
}

function DEMO_CODES(){
  // synthesise plausible class codes for the CURRENT module
  const m=MODULES[CURRENT];
  const comps=[...new Set(m.chapters.flatMap(c=>c.comps))];
  const names=['A.','B.','C.','D.','E.','F.','G.','H.'];
  return names.map((nm,i)=>{
    const sess={module:CURRENT,name:nm,answers:[]};
    comps.forEach(comp=>{
      // each comp tested ~3 times; vary skill so bars differ
      const skill={cause:0.85,continuity:0.7,interdep:0.6,judgement:0.55,perspective:0.75,present:0.8}[comp]||0.7;
      for(let q=0;q<3;q++){ sess.answers.push({cp:'x',q,comp,correct:Math.random()<(skill - i*0.02)}); }
    });
    return Store.encode(sess);
  });
}

function drawBars(){
  const A=UI[LANG].assess;
  const host=document.getElementById('assessResult');
  if(!lastDecoded.length){host.innerHTML=`<div class="empty" style="margin-top:18px;">${A.empty}</div>`;return;}
  const {students,agg}=Store.aggregate(lastDecoded);
  let totC=0,totT=0;Object.values(agg).forEach(v=>{totC+=v.correct;totT+=v.total;});
  const avgPct=totT?Math.round(100*totC/totT):0;
  const bars=Object.keys(agg).sort().map(comp=>{
    const v=agg[comp];const pct=v.total?Math.round(100*v.correct/v.total):0;
    const cls=pct>=75?'hi':pct>=55?'mid':'lo';
    return `<div class="bar-row">
      <div class="bar-top"><span class="bn">${Store.competencyName(comp,LANG)}</span><span class="bf">${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%;"></div></div>
      <div class="bar-hint">${A.hintN(v.correct,v.total)}</div>
    </div>`;
  }).join('');
  host.innerHTML=`
    <div class="ov-grid" style="margin-top:18px;">
      <div class="ov-card"><div class="ov-n">${students}</div><div class="ov-l">${A.students}</div></div>
      <div class="ov-card"><div class="ov-n">${totT}</div><div class="ov-l">${A.answers}</div></div>
      <div class="ov-card"><div class="ov-n">${avgPct}%</div><div class="ov-l">${A.avg}</div></div>
    </div>
    <div class="bars">${bars}</div>
    <div class="legend"><b>${A.legendTitle}</b>
      <span class="sw" style="background:var(--green);"></span>${A.hi}
      <span class="sw" style="background:var(--amber);"></span>${A.mid}
      <span class="sw" style="background:var(--red);"></span>${A.lo}
    </div>`;
}

// tabs
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-'+t.dataset.tab).classList.add('active');
  };
});

try{const s=localStorage.getItem('ghp_lang');if(s)LANG=s;}catch(e){}
setLang(LANG);
</script>
  <script src="/track.js" defer></script>
</body>
</html>
