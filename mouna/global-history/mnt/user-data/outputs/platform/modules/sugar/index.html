<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zucker · Wie die Welt zusammenwuchs — Eine interaktive Reise</title>
<style>
:root {
  --navy-deep: #0A1A3A;
  --navy-mid: #152A5E;
  --navy-light: #1E3470;
  --blue-bright: #1E5AA8;
  --blue-glow: #4A90E2;
  --gold: #F0B33D;
  --gold-bright: #FFD24A;
  --gold-dark: #8C6A1F;
  --white: #FFFFFF;
  --grey-muted: #B0BCD6;
  --green-correct: #2EA84A;
  --green-soft: #1E6E33;
  --red-wrong: #C8312B;
  --red-soft: #5E1F1C;
  --amber: #E8A33C;
  --purple-defi: #7E5AE8;
  --teal: #2DB6A8;
  --cane: #8FbF6f;
  --molasses: #6b4423;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  min-height: 100%;
  font-family: 'Calibri', 'Helvetica Neue', sans-serif;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(30,90,168,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(126,90,232,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at center, var(--navy-mid) 0%, var(--navy-deep) 75%);
  background-attachment: fixed;
  color: var(--white);
  line-height: 1.5;
}
body { padding-bottom: 80px; }

/* === Top progress bar === */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(10,26,58,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(240,179,61,0.3);
  padding: 10px 16px;
}
.topbar-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
.topbar .course-title { font-size: 10px; letter-spacing: 2px; color: var(--gold); font-weight: bold; white-space: nowrap; }
.progress-track { flex: 1; height: 6px; background: var(--navy-deep); border-radius: 3px; overflow: hidden; border: 1px solid rgba(176,188,214,0.2); }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); width: 0%; transition: width 0.5s ease; border-radius: 3px; }
.progress-pct { font-size: 11px; color: var(--gold-bright); font-weight: bold; font-family: Georgia, serif; min-width: 36px; text-align: right; }

/* === Language toggle === */
.lang-toggle { display: flex; gap: 2px; background: var(--navy-deep); border: 1px solid rgba(240,179,61,0.4); border-radius: 20px; padding: 2px; }
.lang-toggle button { background: transparent; border: none; color: var(--grey-muted); font-family: inherit; font-size: 11px; font-weight: bold; letter-spacing: 1px; padding: 4px 10px; border-radius: 16px; cursor: pointer; transition: all .2s; }
.lang-toggle button.active { background: var(--gold); color: var(--navy-deep); }

/* === Main container === */
.container { max-width: 860px; margin: 0 auto; padding: 20px 16px; }

/* === Home / Hero === */
.hero { text-align: center; padding: 40px 16px 26px; }
.hero .eyebrow { font-size: 11px; letter-spacing: 4px; color: var(--gold); font-weight: bold; margin-bottom: 16px; }
.hero h1 {
  font-family: Georgia, serif; font-size: 40px; font-style: italic; line-height: 1.1; margin-bottom: 10px;
  background: linear-gradient(135deg, var(--white), var(--gold-bright));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.hero h1 .sub-line { display:block; font-size: 19px; font-style: italic; margin-top: 8px; -webkit-text-fill-color: var(--grey-muted); color: var(--grey-muted); }
.hero p { color: var(--grey-muted); font-size: 16px; max-width: 620px; margin: 0 auto 8px; }
.phase-divider {
  display: flex; align-items: center; gap: 12px; margin: 26px 4px 8px;
  font-size: 10px; letter-spacing: 3px; color: var(--gold); font-weight: bold;
}
.phase-divider::before, .phase-divider::after { content: ""; flex: 1; height: 1px; background: rgba(240,179,61,0.3); }

.curric-note { background: rgba(45,182,168,0.1); border: 1px solid var(--teal); border-radius: 12px; padding: 12px 16px; margin: 18px 0 6px; font-size: 12.5px; color: #CDE7E4; }
.curric-note .ct { font-size: 10px; letter-spacing: 2px; color: var(--teal); font-weight: bold; display: block; margin-bottom: 5px; }

.section-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.section-card {
  display: flex; align-items: center; gap: 16px;
  background: var(--navy-mid); border: 1px solid var(--blue-bright); border-radius: 12px;
  padding: 15px 18px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
}
.section-card:hover { border-color: var(--gold); transform: translateX(4px); }
.section-card.done { border-color: var(--green-correct); }
.section-card .num { font-family: Georgia, serif; font-size: 24px; font-weight: bold; color: var(--gold); min-width: 38px; text-align: center; }
.section-card.done .num { color: var(--green-correct); }
.section-card .info { flex: 1; }
.section-card .info .name { font-size: 16px; font-weight: bold; font-family: Georgia, serif; }
.section-card .info .tag { font-size: 12px; color: var(--grey-muted); margin-top: 2px; }
.section-card .status { font-size: 20px; }
.section-card .phase-pill {
  position: absolute; top: 8px; right: 10px; font-size: 8px; letter-spacing: 1px; font-weight: bold;
  padding: 2px 7px; border-radius: 10px;
}
.phase-pill.before { background: rgba(30,90,168,0.5); color: var(--blue-glow); }
.phase-pill.system { background: rgba(240,179,61,0.2); color: var(--gold-bright); }
.phase-pill.legacy { background: rgba(45,182,168,0.25); color: var(--teal); }

/* === Concept screens === */
.screen { display: none; }
.screen.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.section-header { text-align: center; margin-bottom: 8px; }
.section-header .kicker { font-size: 11px; letter-spacing: 3px; color: var(--gold); font-weight: bold; }
.section-header h2 { font-family: Georgia, serif; font-size: 30px; font-style: italic; margin: 6px 0 2px; line-height: 1.15; }
.section-header .sub { color: var(--grey-muted); font-size: 13px; }

/* === Step card === */
.step-card { background: rgba(21,42,94,0.6); border: 1px solid var(--blue-bright); border-radius: 16px; padding: 24px 22px; margin-bottom: 18px; backdrop-filter: blur(4px); }
.step-label { display: inline-block; font-size: 10px; letter-spacing: 2px; font-weight: bold; padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; }
.step-label.problem { background: var(--red-soft); color: #FF9B95; border: 1px solid var(--red-wrong); }
.step-label.mechanism { background: rgba(30,90,168,0.3); color: var(--blue-glow); border: 1px solid var(--blue-bright); }
.step-label.why { background: rgba(240,179,61,0.18); color: var(--gold-bright); border: 1px solid var(--gold); }
.step-label.case { background: rgba(45,182,168,0.2); color: var(--teal); border: 1px solid var(--teal); }
.step-card h3 { font-family: Georgia, serif; font-size: 22px; margin-bottom: 8px; line-height: 1.25; }
.step-card p { color: #DCE3F2; margin-bottom: 12px; font-size: 15px; }
.step-card p.lead { font-size: 16px; }
.step-card strong { color: var(--gold-bright); font-weight: 600; }
.step-card em { color: var(--blue-glow); font-style: italic; }
.step-card ul { margin: 4px 0 12px 4px; }
.step-card ul li { color: #DCE3F2; font-size: 14px; list-style: none; padding: 4px 0 4px 22px; position: relative; }
.step-card ul li::before { content: "▸"; position: absolute; left: 0; color: var(--gold); }
.step-card .punch { font-family: Georgia, serif; font-size: 18px; font-style: italic; color: var(--gold-bright); border-left: 3px solid var(--gold); padding-left: 16px; margin: 16px 0 4px; line-height: 1.4; }

/* === Source quote (primary-source habit) === */
.source { background: var(--navy-deep); border-left: 3px solid var(--teal); border-radius: 0 10px 10px 0; padding: 12px 16px; margin: 14px 0; }
.source .src-q { font-family: Georgia, serif; font-style: italic; font-size: 15px; color: #E6ECF7; }
.source .src-cite { font-size: 11px; color: var(--teal); margin-top: 8px; letter-spacing: 0.5px; }

/* === Interactive sandbox === */
.sandbox { background: var(--navy-deep); border: 1px solid rgba(74,144,226,0.4); border-radius: 12px; padding: 18px; margin: 16px 0; }
.sandbox-title { font-size: 10px; letter-spacing: 2px; color: var(--teal); font-weight: bold; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.sandbox-prompt { font-size: 13px; color: var(--grey-muted); margin-bottom: 12px; }

.btn { background: var(--gold); color: var(--navy-deep); border: none; padding: 11px 22px; font-family: inherit; font-size: 13px; font-weight: bold; letter-spacing: 1px; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
.btn:hover { background: var(--gold-bright); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn.ghost { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
.btn.ghost:hover { background: rgba(240,179,61,0.12); }
.btn.small { padding: 7px 14px; font-size: 11px; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 12px; }

/* === Nav footer === */
.nav-footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,26,58,0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(240,179,61,0.3); padding: 12px 16px; z-index: 50; }
.nav-footer-inner { max-width: 860px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; }

/* === Reveal tiles === */
.reveal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 8px; margin: 6px 0; }
.reveal-tile {
  background: var(--navy-mid); border: 1.5px solid var(--blue-bright); border-radius: 10px; padding: 12px 14px;
  cursor: pointer; transition: all 0.2s; position: relative; min-height: 70px;
}
.reveal-tile:hover { border-color: var(--gold); transform: translateY(-2px); }
.reveal-tile .icon { font-size: 22px; }
.reveal-tile .name { font-size: 13px; font-weight: bold; margin-top: 4px; font-family: Georgia, serif; }
.reveal-tile .desc { font-size: 11.5px; color: var(--grey-muted); margin-top: 6px; display: none; line-height: 1.4; }
.reveal-tile.open { background: var(--navy-light); border-color: var(--gold); }
.reveal-tile.open .desc { display: block; }
.reveal-tile.flipped { animation: tilePulse 0.4s; }
@keyframes tilePulse { 0% { box-shadow: 0 0 0 0 rgba(240,179,61,0.6);} 100% { box-shadow: 0 0 0 12px rgba(240,179,61,0);} }

/* === Sort/categorise game === */
.sort-pool { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.sort-chip {
  background: var(--navy-mid); border: 1.5px solid var(--blue-bright); border-radius: 20px;
  padding: 8px 14px; font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.sort-chip:hover { border-color: var(--gold); }
.sort-chip.selected { border-color: var(--gold); background: var(--navy-light); }
.sort-chip.placed { opacity: 0.35; pointer-events: none; text-decoration: line-through; }
.sort-bins { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 560px){ .sort-bins { grid-template-columns: 1fr; } }
.sort-bin { background: var(--navy-deep); border: 1.5px dashed var(--blue-bright); border-radius: 10px; padding: 12px; min-height: 90px; cursor: pointer; transition: all 0.2s; }
.sort-bin:hover { border-color: var(--gold); }
.sort-bin .bin-title { font-size: 11px; letter-spacing: 1px; font-weight: bold; color: var(--gold); margin-bottom: 8px; }
.sort-bin .bin-items { display: flex; flex-direction: column; gap: 6px; }
.sort-bin .bin-item { font-size: 12px; padding: 6px 10px; border-radius: 6px; }
.sort-bin .bin-item.correct { background: var(--green-soft); border: 1px solid var(--green-correct); }
.sort-bin .bin-item.wrong { background: var(--red-soft); border: 1px solid var(--red-wrong); }
.sort-active-prompt { font-size: 12px; color: var(--gold-bright); margin-bottom: 10px; min-height: 18px; }

/* === Two-column contrast (continuity / change) === */
.dd-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:10px 0; }
@media (max-width:560px){ .dd-grid { grid-template-columns:1fr; } }
.dd-col { border-radius:10px; padding:12px 14px; }
.dd-col.do { background:rgba(46,168,74,0.12); border:1px solid var(--green-correct); }
.dd-col.dont { background:rgba(232,163,60,0.12); border:1px solid var(--amber); }
.dd-col .dd-h { font-size:11px; letter-spacing:1px; font-weight:bold; margin-bottom:8px; }
.dd-col.do .dd-h { color:var(--green-correct); }
.dd-col.dont .dd-h { color:var(--amber); }
.dd-col ul { margin:0; }
.dd-col ul li { font-size:12.5px; padding:3px 0 3px 18px; position:relative; list-style:none; }
.dd-col.do ul li::before { content:"⟳"; color:var(--green-correct); position:absolute; left:0; }
.dd-col.dont ul li::before { content:"↗"; color:var(--amber); position:absolute; left:0; }

/* === info table === */
.info-table { width:100%; border-collapse: collapse; font-size:13px; margin:8px 0;}
.info-table td, .info-table th { border:1px solid var(--blue-bright); padding:9px 11px; text-align:left; vertical-align:top;}
.info-table th { background: var(--navy-mid); color: var(--gold); font-size:11px; letter-spacing:1px;}
.info-table td:first-child { color: var(--gold-bright); font-weight:bold; white-space:nowrap; }

/* === Timeline slider === */
.tl-wrap { margin: 14px 0; }
.tl-readout { background: var(--navy-mid); border:1px solid var(--blue-bright); border-radius:12px; padding:16px; margin-bottom:14px; min-height: 160px; transition: all .3s; }
.tl-readout .tl-year { font-family:Georgia,serif; font-size:28px; color:var(--gold-bright); font-weight:bold; }
.tl-readout .tl-who { font-size:14px; color:var(--teal); font-weight:bold; margin-top:2px; letter-spacing:0.5px; }
.tl-readout .tl-what { font-size:14px; color:#DCE3F2; margin-top:8px; line-height:1.5; }
.tl-readout .tl-icon { font-size:30px; float:right; }
.tl-slider-row input[type=range] { width:100%; accent-color: var(--gold); }
.tl-ticks { display:flex; justify-content:space-between; font-size:10px; color:var(--grey-muted); margin-top:4px; }

/* === Trade-route map (NEW format) === */
.map-wrap { position: relative; margin: 10px 0 6px; }
.map-svg { width: 100%; height: auto; display: block; border-radius: 12px; background: linear-gradient(180deg, #0c2245, #0a1a3a); border: 1px solid var(--blue-bright); }
.leg-btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.leg-btn { flex: 1; min-width: 130px; background: var(--navy-mid); border: 1.5px solid var(--blue-bright); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: all .2s; text-align: left; }
.leg-btn:hover { border-color: var(--gold); }
.leg-btn.active { border-color: var(--gold); background: var(--navy-light); }
.leg-btn .lg-n { font-size: 10px; letter-spacing: 1px; font-weight: bold; }
.leg-btn.l1 .lg-n { color: var(--blue-glow); }
.leg-btn.l2 .lg-n { color: var(--red-wrong); }
.leg-btn.l3 .lg-n { color: var(--gold-bright); }
.leg-btn .lg-t { font-size: 13px; font-weight: bold; font-family: Georgia, serif; margin-top: 2px; }
.leg-readout { background: var(--navy-deep); border: 1px solid var(--blue-bright); border-radius: 10px; padding: 14px 16px; margin-top: 12px; min-height: 84px; font-size: 14px; color: #DCE3F2; line-height: 1.55; }
.leg-readout .lr-cargo { font-size: 11px; letter-spacing: 1px; color: var(--gold); font-weight: bold; display: block; margin-bottom: 6px; }
.route-leg { opacity: 0.18; transition: opacity .3s, stroke-width .3s; }
.route-leg.active { opacity: 1; }
.map-port { font-size: 9px; fill: var(--grey-muted); font-family: 'Calibri', sans-serif; }
.map-dot { fill: var(--gold); }

/* === Scenario decision cards (NEW format) === */
.scn { background: var(--navy-deep); border: 1px solid var(--blue-bright); border-radius: 12px; padding: 18px; margin: 14px 0; }
.scn .scn-role { font-size: 10px; letter-spacing: 2px; color: var(--amber); font-weight: bold; }
.scn .scn-situation { font-size: 15px; color: #E6ECF7; margin: 8px 0 14px; line-height: 1.55; }
.scn-choices { display: flex; flex-direction: column; gap: 8px; }
.scn-choice { background: var(--navy-mid); border: 1.5px solid var(--blue-bright); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: all .15s; font-size: 14px; }
.scn-choice:hover:not(.locked) { border-color: var(--gold); }
.scn-choice.chosen { border-color: var(--gold); background: var(--navy-light); }
.scn-choice.locked { cursor: default; }
.scn-outcome { margin-top: 12px; padding: 12px 14px; border-radius: 8px; font-size: 13.5px; line-height: 1.55; display: none; background: rgba(45,182,168,0.1); border-left: 3px solid var(--teal); }
.scn-outcome.show { display: block; animation: fadeIn .3s; }
.scn-outcome .so-h { font-size: 10px; letter-spacing: 1px; font-weight: bold; color: var(--teal); display: block; margin-bottom: 5px; }
.scn-note { font-size: 12px; color: var(--grey-muted); margin-top: 10px; font-style: italic; }

/* === Checkpoint quiz === */
.checkpoint { background: linear-gradient(135deg, rgba(126,90,232,0.15), rgba(30,90,168,0.15)); border: 2px solid var(--purple-defi); border-radius: 16px; padding: 24px 22px; margin-bottom: 18px; }
.checkpoint-header { text-align: center; margin-bottom: 18px; }
.checkpoint-header .badge { display: inline-block; background: var(--purple-defi); color: var(--white); font-size: 10px; letter-spacing: 2px; font-weight: bold; padding: 4px 14px; border-radius: 20px; margin-bottom: 8px; }
.checkpoint-header h3 { font-family: Georgia, serif; font-size: 22px; font-style: italic; }
.checkpoint-header p { color: var(--grey-muted); font-size: 13px; margin-top: 4px; }
.quiz-q { margin-bottom: 18px; }
.quiz-q .q-text { font-family: Georgia, serif; font-size: 17px; margin-bottom: 8px; line-height: 1.35; }
.quiz-q .q-num { color: var(--gold); font-weight: bold; margin-right: 6px; }
.quiz-opts { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt { background: var(--navy-deep); border: 1.5px solid var(--blue-bright); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 12px; font-size: 14px; }
.quiz-opt:hover:not(.locked) { border-color: var(--gold); background: var(--navy-mid); }
.quiz-opt .opt-letter { font-family: Georgia, serif; font-weight: bold; color: var(--gold); min-width: 20px; }
.quiz-opt.correct { background: var(--green-soft); border-color: var(--green-correct); }
.quiz-opt.correct .opt-letter { color: var(--green-correct); }
.quiz-opt.wrong { background: var(--red-soft); border-color: var(--red-wrong); }
.quiz-opt.wrong .opt-letter { color: #FF9B95; }
.quiz-opt.locked { cursor: default; }
.quiz-feedback { margin-top: 10px; padding: 12px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; display: none; }
.quiz-feedback.show { display: block; }
.quiz-feedback.right { background: var(--green-soft); border: 1px solid var(--green-correct); }
.quiz-feedback.wrong-fb { background: var(--red-soft); border: 1px solid var(--red-wrong); }
.quiz-feedback .fb-label { font-weight: bold; letter-spacing: 1px; margin-right: 6px; }
.checkpoint-result { text-align: center; padding: 16px; display: none; }
.checkpoint-result.show { display: block; }
.checkpoint-result .score { font-family: Georgia, serif; font-size: 40px; font-weight: bold; color: var(--gold-bright); }
.checkpoint-result .msg { color: var(--grey-muted); margin: 8px 0 16px; }

/* === Teacher panel === */
.teacher-toggle { text-align:center; margin: 4px 0 0; }
.teacher-toggle a { font-size: 11px; color: var(--teal); cursor: pointer; text-decoration: underline; letter-spacing: 0.5px; }
.teacher-box { background: rgba(45,182,168,0.08); border: 1px dashed var(--teal); border-radius: 12px; padding: 14px 16px; margin: 12px 0 4px; display: none; }
.teacher-box.show { display: block; animation: fadeIn .3s; }
.teacher-box .tb-h { font-size: 10px; letter-spacing: 2px; color: var(--teal); font-weight: bold; margin-bottom: 8px; }
.teacher-box p { font-size: 12.5px; color: #CDE7E4; margin-bottom: 6px; line-height: 1.5; }
.teacher-box .comp { display:inline-block; background: rgba(45,182,168,0.2); color: var(--teal); font-size:10px; font-weight:bold; padding:2px 8px; border-radius:10px; margin:2px 4px 2px 0; letter-spacing:0.5px;}

/* === reset link === */
.reset-link { text-align: center; margin-top: 30px; font-size: 11px; color: var(--grey-muted); }
.reset-link a { color: var(--gold); cursor: pointer; text-decoration: underline; }
.fineprint { font-size: 11px; color: var(--grey-muted); text-align:center; margin-top: 8px; }

/* === result-code modal === */
.modal-bg{position:fixed;inset:0;background:rgba(5,12,28,0.82);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.show{display:flex;animation:fadeIn .3s;}

let LANG = 'de';
const STORAGE_KEY = 'sugar_global_progress_v1';
const LANG_KEY = 'sugar_global_lang_v1';
let progress = loadProgress();
let currentSectionIdx = -1;

function loadProgress(){ try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch(e){} try{if(window._sgp)return window._sgp;}catch(e){} return {completed:{},current:null}; }
function saveProgress(){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(progress));}catch(e){} try{window._sgp=progress;}catch(e){} }
function markComplete(id){ progress.completed[id]=true; saveProgress(); updateProgressBar(); }
function updateProgressBar(){
  const total=SECTIONS.length;
  const done=Object.keys(progress.completed).filter(k=>progress.completed[k]).length;
  const pct=Math.round((done/total)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
}
function t(){ return I18N[LANG]; }

// LANGUAGE
// ============================================================
function setLang(l){
  LANG=l;
  try{localStorage.setItem(LANG_KEY,l);}catch(e){}
  document.documentElement.lang=l;
  document.getElementById('langDE').classList.toggle('active',l==='de');
  document.getElementById('langEN').classList.toggle('active',l==='en');
  renderHomeStatics();
  renderSectionList();
  updateNavFooter();
  // re-render an open section in the new language
  if(currentSectionIdx>=0){ openSection(SECTIONS[currentSectionIdx].id, true); }
}
function renderHomeStatics(){
  const T=t();
  const set=(sel,val)=>{const el=document.querySelector(sel);if(el)el.textContent=val;};
  document.querySelector('.course-title').textContent=T.courseTitle;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const path=el.getAttribute('data-i18n').split('.');
    let v=T; path.forEach(p=>v=v&&v[p]);
    if(typeof v==='string') el.textContent=v;
  });
}

// HOME SECTION LIST
// ============================================================
function renderSectionList(){
  const lists={B:document.getElementById('sectionListB'),S:document.getElementById('sectionListS'),L:document.getElementById('sectionListL')};
  Object.values(lists).forEach(l=>l.innerHTML='');
  const phaseClass={B:'before',S:'system',L:'legacy'};
  const phaseLabel={B:{de:'VORHER',en:'BEFORE'},S:{de:'SYSTEM',en:'SYSTEM'},L:{de:'HEUTE',en:'LEGACY'}};
  SECTIONS.forEach(sec=>{
    const done=!!progress.completed[sec.id];
    const card=document.createElement('div');
    card.className='section-card'+(done?' done':'');
    card.innerHTML=`
      <div class="num">${sec.num}</div>
      <div class="info">
        <div class="name">${sec.name[LANG]}</div>
        <div class="tag">${sec.tag[LANG]}</div>
      </div>
      <div class="status">${done?'✓':'▸'}</div>
      <div class="phase-pill ${phaseClass[sec.phase]}">${phaseLabel[sec.phase][LANG]}</div>`;
    card.onclick=()=>openSection(sec.id);
    lists[sec.phase].appendChild(card);
  });
}

function teacherBoxHTML(sectionId){
  const data=CONTENT[sectionId][LANG].teacher; if(!data) return '';
  const T=t();
  const comps=data.comps.map(c=>`<span class="comp">${c}</span>`).join('');
  const notes=data.notes.map(n=>`<p>• ${n}</p>`).join('');
  return `
    <div class="teacher-toggle"><a class="teacher-open">${T.teacher.open}</a></div>

}

function blockHTML(b){
  let inner='';
  if(b.p) inner+=b.p.map((para,i)=>`<p${i===0?' class="lead"':''}>${para}</p>`).join('');
  if(b.reveals){
    inner+=`<div class="reveal-grid">`+b.reveals.map(r=>`
      <div class="reveal-tile"><div class="icon">${r.icon}</div><div class="name">${r.name}</div><div class="desc">${r.desc}</div></div>`).join('')+`</div>`;
  }
  if(b.map) inner+=mapHTML();
  if(b.scenarios) inner+=scenariosHTML(b.scenarios);
  if(b.sortGame) inner+=sortGameHTML();
  if(b.timeline) inner+=timelineHTML();
  if(b.dd){
    inner+=`<div class="dd-grid">
      <div class="dd-col do"><div class="dd-h">${b.dd.doH}</div><ul>${b.dd.doItems.map(i=>`<li>${i}</li>`).join('')}</ul></div>
      <div class="dd-col dont"><div class="dd-h">${b.dd.dontH}</div><ul>${b.dd.dontItems.map(i=>`<li>${i}</li>`).join('')}</ul></div>
    </div>`;
  }
  if(b.punch) inner+=`<p class="punch">${b.punch}</p>`;
  return `<div class="step-card"><span class="step-label ${b.label}">${b.lt}</span><h3>${b.h}</h3>${inner}</div>`;
}

function wireSection(id){
  wireReveals();
  wireTeacher();
  if(id==='triangle') wireMap();
  if(id==='plantation') wireScenarios();
  if(id==='causes') wireSortGame('#causeGame');
  if(id==='today') wireTimeline();
}

// ---- wiring: reveals ----
function wireReveals(){
  document.querySelectorAll('.reveal-tile').forEach(t=>{
    t.onclick=()=>{ t.classList.toggle('open'); t.classList.remove('flipped'); void t.offsetWidth; t.classList.add('flipped'); };
  });
}
// ---- wiring: teacher panel ----
function wireTeacher(){
  const open=document.querySelector('.teacher-open'), box=document.querySelector('.teacher-box');
  if(open&&box) open.onclick=()=>box.classList.toggle('show');
}
// ---- wiring: map ----
function wireMap(){
  const legs=MAP_LEGS[LANG];
  const btns=document.querySelectorAll('#legBtns .leg-btn');
  const readout=document.getElementById('legReadout');
  btns.forEach(b=>{
    b.onclick=()=>{
      const i=+b.dataset.leg;
      btns.forEach(x=>x.classList.remove('active')); b.classList.add('active');
      document.querySelectorAll('.route-leg').forEach(p=>p.classList.remove('active'));
      const path=document.getElementById('leg'+(i+1)); if(path) path.classList.add('active');
      const l=legs[i];
      readout.innerHTML=`<span class="lr-cargo">${l.cargo}</span>${l.body}`;
    };
  });
}
// ---- wiring: scenarios ----
function wireScenarios(){
  const c=CONTENT['plantation'][LANG];
  const scnData=c.blocks.find(b=>b.scenarios).scenarios;
  document.querySelectorAll('.scn').forEach(scn=>{
    const si=+scn.dataset.scn;
    const choices=scn.querySelectorAll('.scn-choice');
    const outcome=scn.querySelector('.scn-outcome');
    choices.forEach(ch=>{
      ch.onclick=()=>{
        if(scn.dataset.locked)return;
        scn.dataset.locked='1';
        const ci=+ch.dataset.choice;
        choices.forEach(x=>x.classList.add('locked'));
        ch.classList.add('chosen');
        outcome.querySelector('.so-body').innerHTML=scnData[si].choices[ci].out;
        outcome.classList.add('show');
      };
    });
  });
}
// ---- wiring: sort game ----
function wireSortGame(rootSel){
  const root=document.querySelector(rootSel); if(!root)return;
  const d=SORT_DATA[LANG];
  const prompt=root.querySelector('.sort-active-prompt');
  let selected=null; const placed={};
  root.querySelectorAll('.sort-chip').forEach(chip=>{
    chip.onclick=()=>{
      if(chip.classList.contains('placed'))return;
      root.querySelectorAll('.sort-chip').forEach(c=>c.classList.remove('selected'));
      chip.classList.add('selected'); selected=chip;
      prompt.textContent=d.pickBin;
    };
  });
  root.querySelectorAll('.sort-bin').forEach(bin=>{
    bin.onclick=()=>{
      if(!selected)return;
      const itemKey=selected.dataset.key;
      const isRight=(bin.dataset.bin===SORT_ITEMS[itemKey]);
      const itemsBox=bin.querySelector('.bin-items');
      const div=document.createElement('div');
      div.className='bin-item '+(isRight?'correct':'wrong');
      div.textContent=(isRight?'✓ ':'✗ ')+selected.textContent;
      itemsBox.appendChild(div);
      selected.classList.add('placed'); selected.classList.remove('selected');
      placed[itemKey]=true; selected=null;
      const allDone=Object.keys(SORT_ITEMS).every(k=>placed[k]);
      prompt.textContent= allDone ? d.doneMsg : d.nextMsg;
    };
  });
}
// ---- wiring: timeline ----
function wireTimeline(){
  const data=TIMELINE[LANG];
  const slider=document.getElementById('tlSlider'), out=document.getElementById('tlReadout');
  function render(){ const dd=data[+slider.value]; out.innerHTML=`<span class="tl-icon">${dd.icon}</span><div class="tl-year">${dd.year}</div><div class="tl-who">${dd.who}</div><div class="tl-what">${dd.what}</div>`; }
  slider.oninput=render; render();
}

// ============================================================
// CHECKPOINT WIRING
// ============================================================
function wireCheckpoint(id){
  const cp=CHECKPOINTS[id][LANG]; if(!cp)return;
  const T=t();
  const cpEl=document.querySelector(`.checkpoint[data-section="${id}"]`); if(!cpEl)return;
  const answered={}; const total=cp.questions.length;
  const correctCount=()=>Object.values(answered).filter(v=>v===true).length;
  cpEl.querySelectorAll('.quiz-opt').forEach(opt=>{
    opt.onclick=()=>{
      const qi=+opt.dataset.qi, oi=+opt.dataset.oi;
      if(answered[qi]!==undefined)return;
      const q=cp.questions[qi];
      const opts=cpEl.querySelectorAll(`.quiz-opt[data-qi="${qi}"]`);
      opts.forEach(o=>o.classList.add('locked'));
      const fb=cpEl.querySelector(`.quiz-feedback[data-qi="${qi}"]`);
      if(oi===q.correct){ opt.classList.add('correct'); answered[qi]=true; fb.className='quiz-feedback right show'; fb.innerHTML=`<span class="fb-label">${T.cp.correct}</span>${q.fb}`; }
      else { opt.classList.add('wrong'); opts[q.correct].classList.add('correct'); answered[qi]=false; fb.className='quiz-feedback wrong-fb show'; fb.innerHTML=`<span class="fb-label">${T.cp.notquite}</span>${q.fb}`; }
      // record to assessment store (competency-tagged)
      try{ const comp=(COMP_MAP[id]&&COMP_MAP[id][qi])||'cause'; Store.record(id, qi, comp, oi===q.correct); }catch(e){}
      if(Object.keys(answered).length===total) showResult();
    };
  });
  function showResult(){
    const result=cpEl.querySelector('.checkpoint-result');
    const score=correctCount();
    result.querySelector('.score').textContent=`${score} / ${total}`;
    let msg;
    if(score===total) msg=T.cp.perfect;
    else if(score>=total-1) msg=T.cp.strong;
    else msg=T.cp.ok;
    result.querySelector('.msg').textContent=msg;
    result.classList.add('show');
    result.scrollIntoView({behavior:'smooth',block:'center'});
    const finishBtn=result.querySelector('[data-action="finish-section"]');
    finishBtn.onclick=()=>{
      markComplete(id); updateNavFooter();
      const nextIdx=currentSectionIdx+1; const nextBtn=document.getElementById('navNext');
      nextBtn.disabled=false;
      if(nextIdx<SECTIONS.length){ nextBtn.textContent=T.nav.next; nextBtn.onclick=()=>openSection(SECTIONS[nextIdx].id); }
      else { nextBtn.textContent=T.nav.finish; nextBtn.onclick=goHome; showResultModal(); }
      finishBtn.textContent=T.nav.completed; finishBtn.disabled=true;
      nextBtn.scrollIntoView({behavior:'smooth'});
    };
  }
}

// ============================================================
// ROUTING
// ============================================================
function openSection(id, keepScroll){
  const idx=SECTIONS.findIndex(s=>s.id===id); if(idx<0)return;
  currentSectionIdx=idx;
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screenMount').innerHTML=`<div class="screen active">${buildSection(id)}</div>`;
  wireSection(id);
  wireCheckpoint(id);
  updateNavFooter();
  if(!keepScroll) window.scrollTo({top:0,behavior:'smooth'});
  progress.current=id; saveProgress();
}
function goHome(){
  currentSectionIdx=-1;
  document.getElementById('screenMount').innerHTML='';
  document.getElementById('screen-home').classList.add('active');
  renderSectionList(); updateNavFooter();
  window.scrollTo({top:0,behavior:'smooth'});
}
function updateNavFooter(){
  const T=t();
  const back=document.getElementById('navBack'),next=document.getElementById('navNext'),label=document.getElementById('navLabel');
  if(currentSectionIdx<0){
    back.style.visibility='hidden';
    const firstInc=SECTIONS.findIndex(s=>!progress.completed[s.id]);
    next.textContent=firstInc>=0?T.nav.start:T.nav.review;
    next.disabled=false;
    next.onclick=()=>openSection(SECTIONS[firstInc>=0?firstInc:0].id);
    label.textContent='';
  } else {
    back.style.visibility='visible'; back.textContent=T.nav.allSections; back.onclick=goHome;
    const sec=SECTIONS[currentSectionIdx];
    label.textContent=T.nav.sectionOf(sec.num,SECTIONS.length);
    const done=!!progress.completed[sec.id]; const nextIdx=currentSectionIdx+1;
    if(done && nextIdx<SECTIONS.length){ next.textContent=T.nav.next; next.disabled=false; next.onclick=()=>openSection(SECTIONS[nextIdx].id); }
    else if(done && nextIdx>=SECTIONS.length){ next.textContent=T.nav.finish; next.disabled=false; next.onclick=goHome; }
    else { next.textContent=T.nav.finishCp; next.disabled=true; next.onclick=null; }
  }
}

// ---- result-code modal ----
function showResultModal(){
  const T=t(); let code='';
  try{ code=Store.encode(Store.getSession()); Store.cacheLocal(); }catch(e){ code='GHP1|sugar||'; }
  document.getElementById('rmTitle').textContent=T.result.title;
  document.getElementById('rmBody').textContent=T.result.body;
  document.getElementById('rmCode').textContent=code;
  const copy=document.getElementById('rmCopy'), close=document.getElementById('rmClose');
  copy.textContent=T.result.copy; close.textContent=T.result.close;
  copy.onclick=()=>{ try{navigator.clipboard.writeText(code);}catch(e){} copy.textContent=T.result.copied; };
  close.onclick=()=>document.getElementById('resultModal').classList.remove('show');
  document.getElementById('resultModal').classList.add('show');
}
