function b64(s){ var bin=atob(s), a=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a; }
function norm(s){ return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toLowerCase(); }
async function decrypt(pw){
  var km  = await crypto.subtle.importKey('raw', new TextEncoder().encode(norm(pw)), {name:'PBKDF2'}, false, ['deriveKey']);
  var key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:b64(ENC.salt), iterations:ENC.iter, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  var pt  = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(ENC.iv)}, key, b64(ENC.ct));
  return new TextDecoder().decode(pt);
}
var KEY = 'nv26-auth';
function render(docHtml){
  var parsed = new DOMParser().parseFromString(docHtml, 'text/html'), i, n;
  if(parsed.title){ document.title = parsed.title; }
  var g = document.head.querySelectorAll('style'); for(i=0;i<g.length;i++){ g[i].remove(); }
  var p = parsed.head.querySelectorAll('style, link[rel="stylesheet"]'); for(i=0;i<p.length;i++){ document.head.appendChild(document.importNode(p[i], true)); }
  var scr = [], s = parsed.body.querySelectorAll('script'); for(i=0;i<s.length;i++){ scr.push(s[i]); }
  for(i=0;i<scr.length;i++){ scr[i].parentNode.removeChild(scr[i]); }
  document.body.className = parsed.body.className || '';
  document.body.innerHTML = parsed.body.innerHTML;
  for(i=0;i<scr.length;i++){ n = document.createElement('script'); if(scr[i].src){ n.src = scr[i].src; } else { n.textContent = scr[i].textContent; } document.body.appendChild(n); }
  window.scrollTo(0,0);
}
var f=document.getElementById('f'), pw=document.getElementById('pw'), err=document.getElementById('err'), b=document.getElementById('b'), main=document.querySelector('main');
if(!(window.crypto && crypto.subtle)){ err.textContent='Ce navigateur requiert une connexion sécurisée (https).'; err.hidden=false; }
f.addEventListener('submit', async function(e){
  e.preventDefault(); err.hidden=true; b.disabled=true; b.textContent='…';
  try{
    var doc = await decrypt(pw.value);
    try{ localStorage.setItem(KEY, pw.value); }catch(_){}
    render(doc);
  }catch(ex){
    err.hidden=false; b.disabled=false; b.textContent='Entrer'; pw.value=''; pw.focus();
  }
});
(function(){
  var saved=null; try{ saved=localStorage.getItem(KEY); }catch(_){}
  if(saved && window.crypto && crypto.subtle){
    main.style.display='none';
    decrypt(saved).then(render).catch(function(){ main.style.display=''; try{ localStorage.removeItem(KEY); }catch(_){} });
  }
})();
