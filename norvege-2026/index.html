<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Norvège 2026 — accès privé</title>
<style>
  :root{ --fjord:#0d3b4f; --teal:#1b7a8c; --gold:#e3a13a; --paper:#fbf8f1; --muted:#5d7682; --line:#dcd2bf; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; background:var(--fjord); color:#16323c; min-height:100vh; display:grid; place-items:center; padding:24px; }
  .card{ background:var(--paper); border-radius:20px; box-shadow:0 22px 60px rgba(0,0,0,.4); max-width:380px; width:100%; padding:38px 34px; text-align:center; }
  .mtn{ width:62px; height:62px; margin:0 auto 14px; display:block; }
  h1{ font-family:Georgia,"Times New Roman",serif; color:var(--fjord); font-size:30px; letter-spacing:-.5px; margin-bottom:6px; }
  .sub{ color:var(--muted); font-size:14px; line-height:1.5; margin-bottom:24px; }
  form{ display:flex; flex-direction:column; gap:12px; }
  input{ font:inherit; font-size:16px; padding:13px 15px; border:1px solid var(--line); border-radius:11px; background:#fff; text-align:center; }
  input:focus{ outline:2px solid var(--gold); outline-offset:1px; border-color:var(--gold); }
  button{ font:inherit; font-size:15px; font-weight:700; padding:13px; border:0; border-radius:11px; background:var(--fjord); color:#fff; cursor:pointer; letter-spacing:.02em; transition:background .2s; }
  button:hover{ background:var(--teal); }
  button:disabled{ opacity:.6; cursor:default; }
  .err{ color:#b3402e; font-size:13.5px; margin-top:14px; }
  .hint{ color:var(--muted); font-size:12px; margin-top:18px; }
</style>
</head>

      <h1>Norvège 2026</h1>
      <p class="sub">Page privée du groupe.<br>Entrez le mot de passe.</p>
      <form id="f">
        <input id="pw" type="password" autocomplete="current-password" autofocus placeholder="Mot de passe" aria-label="Mot de passe">
        <button id="b" type="submit">Entrer</button>
      </form>
      <p id="err" class="err" hidden>Mot de passe incorrect — réessayez.</p>

function norm(s){ return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toLowerCase(); }
async function decrypt(pw){
