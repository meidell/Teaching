<style>

<style>

  background: var(--navy-mid); border: 1px solid var(--blue-bright);
  border-radius: 16px; padding: 28px 26px; text-align: center;
}
.q-card .q-num { font-size: 12px; letter-spacing: 2px; color: var(--teal); font-weight: bold; margin-bottom: 8px; }
.q-card .q-text { font-family: Georgia, serif; font-size: 26px; font-style: italic; line-height: 1.25; margin-bottom: 8px; }

}

}
.trail-chip.yes { border-color: var(--green-correct); color: #A8E8B5; }
.trail-chip.no { border-color: var(--red-wrong); color: #FF9B95; }
.result-card { border-radius: 16px; padding: 30px 28px; text-align: center; }
.result-card.chain { background: rgba(46,168,74,0.14); border: 2px solid var(--green-correct); }
.result-card.perm { background: rgba(240,179,61,0.14); border: 2px solid var(--gold); }

.result-card .r-verdict { font-family: Georgia, serif; font-size: 30px; font-style: italic; margin-bottom: 10px; }
.result-card.chain .r-verdict { color: #A8E8B5; }
.result-card.perm .r-verdict { color: var(--gold-bright); }
.result-card.db .r-verdict { color: #FF9B95; }
.result-card .r-body { font-size: 16px; color: #DCE3F2; max-width: 640px; margin: 0 auto 8px; line-height: 1.5; }
.result-card .r-eg { font-size: 13px; color: var(--grey-muted); margin-top: 12px; }
.progress-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 18px; }

<div class="topbar"><div class="topbar-inner">
  <span class="course-title">DECISION TOOL</span>

</div></div>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow">RUN ANY IDEA THROUGH IT</div>
    <h1>Should this be<br>a blockchain?</h1>
    <p>Answer four questions about your project. The tool lands you on an honest verdict: a public chain, a permissioned chain, or just a database. Run your own pitch through it now.</p>
  </div>

  <div class="progress-dots" id="dots"></div>
  <div class="trail" id="trail"></div>
  <div class="q-stage" id="stage"></div>

  <div class="btn-row" style="justify-content:center; margin-top:20px;">
    <button class="btn ghost" id="backBtn" style="visibility:hidden;">← Back</button>
    <button class="btn ghost" id="restartBtn">↺ Restart</button>
  </div>
</div>

<script>
const QUESTIONS = [
  { id: 'central',
    text: 'Is there one party everyone already trusts to hold the records?',
    hint: 'A bank, a government registry, a single company everyone is fine relying on. If yes, you may not need to remove that trust.',
    yes: { label: 'Yes — one trusted keeper is fine', sub: 'e.g. our own internal database', go: 'DB_TRUSTED' },
    no:  { label: 'No — no single party can be trusted', sub: 'rival firms, cross-border, adversarial', go: 1 } },
  { id: 'tamper',
    text: 'Must past records be impossible to quietly rewrite?',
    hint: 'Does an edit or deletion after the fact need to be detectable by everyone?',
    yes: { label: 'Yes — tamper-evidence is essential', sub: 'retirements, audits, provenance', go: 2 },
    no:  { label: 'No — we can trust normal backups', sub: 'edits are fine, low stakes', go: 'DB_NOTAMPER' } },
  { id: 'verify',
    text: 'Must outsiders verify the data WITHOUT asking the operator?',
    hint: 'Auditors, NGOs, buyers in other countries checking for themselves — no permission needed.',
    yes: { label: 'Yes — public verification matters', sub: 'anyone can check independently', go: 3 },
    no:  { label: 'No — only known members need access', sub: 'a vetted consortium', go: 'PERM' } },
  { id: 'enforce',
    text: 'Should the rules run automatically as code, not as policy?',
    hint: 'e.g. "a credit can only be retired once" enforced by a contract, not by staff following a procedure.',
    yes: { label: 'Yes — programmable enforcement', sub: 'smart contracts run the rules', go: 'CHAIN' },
    no:  { label: 'No — humans apply the rules', sub: 'manual processes are acceptable', go: 'PERM' } }
];

const RESULTS = {
  CHAIN: { cls: 'chain', verdict: 'A public blockchain is justified',
    body: 'You need all four properties at once: no trusted central party, tamper-evidence, external verification, and code-enforced rules. This is exactly what a public chain provides — and what a database cannot.',
    eg: 'Like: Power Ledger (P2P energy), Toucan (carbon bridge). Now name your chain and the property you\u2019re optimising for.' },
  PERM: { cls: 'perm', verdict: 'A permissioned chain (or shared DB) likely fits better',
    body: 'You want tamper-evidence and shared records, but only among known, vetted members — and you don\u2019t need anonymous outsiders to verify. A permissioned chain like Hyperledger Fabric gives you that without a token or public network.',
    eg: 'Like: IBM Food Trust. Be honest in your pitch: this is the strongest position if it\u2019s the truth.' },
  DB_TRUSTED: { cls: 'db', verdict: 'You need a database, not a blockchain',
    body: 'If one party is already trusted to hold the truth and outsiders accept that, a blockchain adds cost, complexity, and energy for no benefit. The mutual-distrust that justifies a blockchain isn\u2019t present.',
    eg: 'Adding "blockchain" here is a buzzword, not an architecture. A sharp investor will catch it.' },
  DB_NOTAMPER: { cls: 'db', verdict: 'A database is the honest answer',
    body: 'Without a hard need for tamper-evidence, the core thing a blockchain buys you isn\u2019t required. A well-run database with backups is cheaper, faster, and simpler.',
    eg: 'Save the blockchain for problems where rewriting history must be impossible.' }
};

let path = [];

function render() {
  const dots = document.getElementById('dots');
  dots.innerHTML = QUESTIONS.map((q, i) => {
    const cls = i < path.length ? 'done' : (i === path.length ? 'active' : '');
    return `<div class="dot ${cls}"></div>`;
  }).join('');

  const trail = document.getElementById('trail');
  trail.innerHTML = path.map(p => `<div class="trail-chip ${p.ans}">${p.qShort}: ${p.ans.toUpperCase()}</div>`).join('');

  const stage = document.getElementById('stage');
  document.getElementById('backBtn').style.visibility = path.length ? 'visible' : 'hidden';

  let idx = 0;
  let terminal = null;
  for (const step of path) {
    if (typeof step.go === 'number') idx = step.go;
    else { terminal = step.go; break; }
  }

  if (terminal) {
    const r = RESULTS[terminal];
    stage.innerHTML = `
      <div class="result-card ${r.cls}">
        <div class="r-verdict">${r.verdict}</div>
        <div class="r-body">${r.body}</div>
        <div class="r-eg">${r.eg}</div>
      </div>`;
    return;
  }

  const q = QUESTIONS[idx];
  stage.innerHTML = `
    <div class="q-card">
      <div class="q-num">QUESTION ${idx + 1} OF 4</div>
      <div class="q-text">${q.text}</div>
      <div class="q-hint">${q.hint}</div>
      <div class="q-opts">
        <button class="q-btn" data-ans="yes">${q.yes.label}<span class="sub">${q.yes.sub}</span></button>
        <button class="q-btn" data-ans="no">${q.no.label}<span class="sub">${q.no.sub}</span></button>
      </div>
    </div>`;
  stage.querySelectorAll('.q-btn').forEach(btn => {
    btn.onclick = () => {
      const ans = btn.dataset.ans;
      const branch = q[ans];
      const qShort = { central: 'Trusted party', tamper: 'Tamper-evident', verify: 'External verify', enforce: 'Code rules' }[q.id];
      path.push({ qShort, ans, go: branch.go });
      render();
      window.scrollTo({ top: document.querySelector('.q-stage').offsetTop - 120, behavior: 'smooth' });
    };
  });
}

document.getElementById('backBtn').onclick = () => { path.pop(); render(); };
document.getElementById('restartBtn').onclick = () => { path = []; render(); };
render();
</script>
