<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FanzClub — Hockey-appen for supporterklubber</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #F5C518;
    --gold-dim: rgba(245,197,24,0.15);
    --bg: #0a0a0a;
    --card: #161616;
    --card-hover: #1e1e1e;
    --text: #f0f0f0;
    --muted: #888;
    --radius: 16px;
    --green: #2ea84a;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ── */
  .hero {
    text-align: center;
    margin-bottom: 56px;
  }
  .hero h1 {
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .hero h1 span { color: var(--gold); }
  .hero p {
    color: var(--muted);
    font-size: 1.05rem;
  }

  /* ── Presentation link ── */
  .presentation-link {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card);
    border: 1px solid rgba(245,197,24,0.25);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 48px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.2s, border-color 0.3s;
  }
  .presentation-link:hover {
    background: var(--card-hover);
    border-color: var(--gold);
  }
  .presentation-link .icon {
    font-size: 2rem;
    flex-shrink: 0;
  }
  .presentation-link .label {
    font-weight: 700;
    font-size: 1.1rem;
  }
  .presentation-link .sublabel {
    color: var(--muted);
    font-size: 0.85rem;
  }
  .presentation-link .arrow {
    margin-left: auto;
    color: var(--gold);
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  /* ── Section headings ── */
  .section-title {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--gold-dim);
  }

  /* ── Forms ── */
  .form-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 40px;
  }

  .field { margin-bottom: 18px; }

  .field label {
    display: block;
    font-weight: 600;
    font-size: 0.85rem;
    margin-bottom: 6px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field input,
  .field textarea,
  .field select {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    transition: border-color 0.2s;
    outline: none;
  }
  .field input:focus,
  .field textarea:focus,
  .field select:focus {
    border-color: var(--gold);
  }
  .field textarea { resize: vertical; min-height: 100px; }

  .field select option { background: var(--bg); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 28px;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .btn:active { transform: scale(0.97); }

  .btn-gold {
    background: var(--gold);
    color: #0a0a0a;
  }
  .btn-gold:hover {
    box-shadow: 0 4px 20px rgba(245,197,24,0.35);
  }

  .btn-outline {
    background: transparent;
    color: var(--gold);
    border: 2px solid var(--gold);
  }
  .btn-outline:hover {
    background: var(--gold-dim);
  }

  /* ── Success state ── */
  .form-card.submitted {
    position: relative;
    pointer-events: none;
  }
  .form-card.submitted::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(10,10,10,0.8);
    border-radius: var(--radius);
    z-index: 1;
  }
  .success-msg {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 2;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .form-card.submitted .success-msg { display: flex; }
  .success-msg .check {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  .success-msg p {
    font-weight: 600;
    font-size: 1.05rem;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 24px;
  }

  @media (max-width: 480px) {
    .container { padding: 32px 16px 60px; }
    .hero h1 { font-size: 1.8rem; }
    .presentation-link { padding: 18px 20px; }
    .form-card { padding: 20px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="hero">
    <img src="assets/app-icon.png" alt="FanzClub" style="width:100px;height:100px;border-radius:24px;margin-bottom:20px;box-shadow:0 8px 30px rgba(245,197,24,0.2);">
    <h1><span>FanzClub</span></h1>
    <p>Hockey-appen for supporterklubber</p>
  </div>

  <a href="presentation.html" class="presentation-link">
    <div class="icon">&#127935;</div>
    <div>
      <div class="label">Se presentasjonen</div>
      <div class="sublabel">Interaktiv pitch-deck for Hockey-appen</div>
    </div>
    <div class="arrow">&#8594;</div>
  </a>

  <!-- Feedback -->
  <h2 class="section-title">Tilbakemelding</h2>
  <div class="form-card" id="feedback-card" style="position:relative;">
    <div class="success-msg">
      <div class="check">&#10003;</div>
      <p>Takk for tilbakemeldingen!</p>
    </div>
    <form id="feedback-form" action="https://formsubmit.co/janerik.meidell@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="FanzClub — Tilbakemelding">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_next" value="">
      <div class="field">
        <label for="fb-name">Navn</label>
        <input type="text" id="fb-name" name="Navn" required>
      </div>
      <div class="field">
        <label for="fb-role">Rolle</label>
        <select id="fb-role" name="Rolle">
          <option value="Supporterklubb-medlem">Supporterklubb-medlem</option>
          <option value="Klubbleder">Klubbleder</option>
          <option value="Spiller / ansatt">Spiller / ansatt</option>
          <option value="Annet">Annet</option>
        </select>
      </div>
      <div class="field">
        <label for="fb-msg">Hva synes du?</label>
        <textarea id="fb-msg" name="Tilbakemelding" required placeholder="Del dine tanker om konseptet, funksjoner, design ..."></textarea>
      </div>
      <button type="submit" class="btn btn-gold">Send tilbakemelding</button>
    </form>
  </div>

  <!-- Tester request -->
  <h2 class="section-title">Bli beta-tester</h2>
  <div class="form-card" id="tester-card" style="position:relative;">
    <div class="success-msg">
      <div class="check">&#127881;</div>
      <p>Du er registrert som beta-tester!</p>
    </div>
    <form id="tester-form" action="https://formsubmit.co/janerik.meidell@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="FanzClub — Beta-tester forespørsel">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_next" value="">
      <div class="field">
        <label for="ts-name">Navn</label>
        <input type="text" id="ts-name" name="Navn" required>
      </div>
      <div class="field">
        <label for="ts-email">E-post</label>
        <input type="email" id="ts-email" name="E-post" required placeholder="din@epost.no">
      </div>
      <div class="field">
        <label for="ts-club">Supporterklubb</label>
        <input type="text" id="ts-club" name="Supporterklubb" placeholder="Valgfritt">
      </div>
      <div class="field">
        <label for="ts-device">Enhet</label>
        <select id="ts-device" name="Enhet">
          <option value="iPhone">iPhone</option>
          <option value="Android">Android</option>
          <option value="Begge">Begge</option>
        </select>
      </div>
      <div class="field">
        <label for="ts-msg">Hvorfor vil du teste?</label>
        <textarea id="ts-msg" name="Motivasjon" placeholder="Fortell gjerne litt om deg selv og din interesse ..."></textarea>
      </div>
      <button type="submit" class="btn btn-outline">Send forespørsel</button>
    </form>
  </div>

  <div class="footer">FanzClub &copy; 2026</div>
</div>

<script>
document.querySelectorAll('.form-card form').forEach(form => {
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const card = this.closest('.form-card');
    const data = new FormData(this);

    fetch(this.action, {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    }).then(r => {
      if (r.ok || r.status === 200) {
        card.classList.add('submitted');
      } else {
        alert('Noe gikk galt. Prøv igjen.');
      }
    }).catch(() => {
      alert('Noe gikk galt. Sjekk nettforbindelsen og prøv igjen.');
    });
  });
});
</script>
</body>
</html>
